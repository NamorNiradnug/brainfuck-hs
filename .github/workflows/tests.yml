name: tests
on: [push, pull_request]

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.12.2'
          cabal-version: '3.16.1.0'
      - name: Build
        run: cabal build all
      - name: Run Tests
        run: cabal test all
